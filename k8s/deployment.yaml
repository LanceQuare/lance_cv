apiVersion: apps/v1
kind: Deployment
metadata:
  name: lance-cv
  namespace: lance-cv
  labels:
    app.kubernetes.io/name: lance-cv
    app.kubernetes.io/component: web
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: lance-cv
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lance-cv
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: web
          image: docker.io/your-dockerhub-user/lance-cv:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /__health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /__health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi